<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拼图编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="sidebar">
        <section class="library-panel">
          <div class="panel-actions">
            <label class="import-button">
              <input id="imageInput" type="file" accept="image/*" multiple />
              添加图片
            </label>
            <button id="importAllImages" type="button">全部导入</button>
            <button id="clearImages" type="button">清空图片</button>
          </div>
          <div class="image-library" id="imageLibrary" aria-label="拼图图片库"></div>
        </section>

        <section class="pieces-panel" id="piecesPanel">
          <div class="panel-actions">
            <button id="resetPieces" type="button">重置碎片</button>
            <button id="autoImportPieces" type="button">一键导入</button>
          </div>
          <div class="piece-summary" id="pieceSummary">
            小拼图 0 个，中拼图 0 个，大拼图 0 个
          </div>
          <div class="stats" id="stats">
            单片 70 x 90，画布 6 x 6
          </div>

          <div class="tray" id="tray" aria-label="拼图碎片托盘"></div>
        </section>
      </section>

      <section class="workspace">
        <button id="exitPlayModeButton" class="exit-play-button" type="button">退出</button>
        <div class="board-actions">
          <button id="playModeButton" type="button">试玩</button>
        </div>
        <div class="board-wrap">
          <div id="board" class="board" aria-label="6 x 6 拼图画布"></div>
        </div>
      </section>

      <section class="queue-panel" id="queuePanel">
        <div class="queue-header">碎片队列</div>
        <div class="piece-queue" id="pieceQueue" aria-label="拼图碎片队列"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
